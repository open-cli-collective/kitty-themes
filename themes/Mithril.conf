# vim:ft=kitty
## name: Mithril
## license: MIT
## blurb: A light kitty theme. Cool, near-white, vibrant accents.
##        All 16 ANSI colors hit ≥4.5:1 contrast against the background,
##        except color7 which is intentionally muted (used as "dim").

