# vim:ft=kitty
## name: Mithril
## license: MIT
## blurb: A light kitty theme. Soft neutral-gray background, vibrant accents.
##        Tuned for sustained-reading contrast — accent colors are bright
##        enough to stand out against the muted gray bg without going dark.
##        color7 is intentionally muted (used as the "dim" role).

background              #d8d8db
foreground              #1a1e22
selection_background    #cfe4ff
selection_foreground    #0c1116

cursor                  #2563eb
cursor_text_color       #d8d8db

url_color               #1d4ed8

active_tab_background   #1a1e22
active_tab_foreground   #d8d8db
inactive_tab_background #eef0f3
inactive_tab_foreground #5b6470

active_border_color     #2563eb
inactive_border_color   #d6dae0

color0  #1a1e22
color8  #5b6470
color1  #c8253a
color9  #9a1d2b
color2  #1d7a3c
color10 #135d2a
